<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explora el Destino</title>
    <link rel="stylesheet" href="styles/cards.css">
</head>
<body>

    <div class="main-wrapper">
        <div class="travel-card">
            <div class="card-header">
                <img src="https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?w=800" alt="Destino">
                <div class="badge-price">$50 USD</div>
            </div>

            <div class="card-body">
                <span class="location-tag">París, Francia</span>
                <h1>Torre Eiffel</h1>
                
                <div class="stats-row">
                    <div class="stat-item">
                        <strong>356</strong>
                        <span>Tours</span>
                    </div>
                    <div class="stat-item">
                        <strong>4.8</strong>
                        <span>Rating</span>
                    </div>
                    <div class="stat-item">
                        <strong>Icono</strong>
                        <span>Categoría</span>
                    </div>
                </div>

                <p class="description">
                    Disfruta de una vista inigualable de la "Ciudad de la Luz". Este paquete incluye acceso prioritario al segundo nivel y una guía bilingüe para conocer la historia del monumento más famoso del mundo.
                </p>

                <div class="footer-actions">
                    <a href="index.html" class="btn-back">← Explorar más</a>
                    <button class="btn-book">Reservar Ahora</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
